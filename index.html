<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepVault</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#000 0%,#1a1400 25%,#332600 50%,#1a1400 75%,#000 100%);color:#d4af37;overflow-x:hidden}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(212,175,55,0.08), transparent);
  animation:shineMove 8s linear infinite;
  pointer-events:none;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(rgba(212,175,55,0.08) 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.4;
  pointer-events:none;
}

@keyframes shineMove{
  0%{transform:translateX(-60%)}
  100%{transform:translateX(60%)}
}
header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid #d4af37;background:#050505;position:sticky;top:0;z-index:10}
h1{margin:0;font-size:1.5rem;letter-spacing:1px}
nav a{color:#d4af37;margin-left:18px;text-decoration:none;font-weight:600;cursor:pointer}
nav a:hover{text-decoration:underline}
.page{display:none;min-height:calc(100vh - 80px);padding:40px 24px}
.page.active{display:block}
.hero{max-width:900px;margin:80px auto 40px;text-align:center}
.hero h2{font-size:3rem;margin-bottom:12px;position:relative;display:inline-block}

.hero h2::before{
  content:"";
  position:absolute;
  inset:-40px -80px;
  background:radial-gradient(circle at center, rgba(212,175,55,0.35), rgba(212,175,55,0.08) 40%, transparent 70%);
  filter:blur(25px);
  animation:spotlightPulse 4s ease-in-out infinite;
  z-index:-1;
}

.hero h2::after{
  content:"";
  position:absolute;
  inset:-80px -120px;
  background:radial-gradient(circle at 60% 40%, rgba(212,175,55,0.25), transparent 60%);
  filter:blur(45px);
  animation:spotlightMove 10s ease-in-out infinite alternate;
  z-index:-2;
}

@keyframes spotlightPulse{
  0%{opacity:.5;transform:scale(.95)}
  50%{opacity:1;transform:scale(1.05)}
  100%{opacity:.5;transform:scale(.95)}
}
